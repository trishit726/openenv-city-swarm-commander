spec_version: 1
name: "city-swarm-commander"
version: "1.0.0"
description: "The environment simulates a real-world drone fleet logistics command center (like Zipline, Wing, Amazon Prime Air, and Skye Air in 2026). The LLM agent acts as the high-level 'Swarm Commander' and must maximize the Mission Success Score (0.0-1.0) by completing time-sensitive deliveries while managing battery, weather emergencies, and drone failures using only high-level strategic tools."
language: "python"
entrypoint: "environment.py:SwarmEnvironment"
app: "server.app:app"

metrics:
  - name: "Mission Success Score"
    type: "float"
    range: [0.0, 1.0]

tasks:
  - id: easy_task
    name: Easy Task
    description: "4 drones, 6 deliveries, clear weather. Tests basic strategic capability."
    difficulty: easy
    grader: server.graders:EasyGrader
  - id: medium_task
    name: Medium Task
    description: "6 drones, 12 deliveries, rain. Weather introduces strategic battery decay management."
    difficulty: medium
    grader: server.graders:MediumGrader
  - id: hard_task
    name: Hard Task
    description: "8 drones, 20 deliveries, storm + drone failure mechanics. Hardcore network incident orchestration."
    difficulty: hard
    grader: server.graders:HardGrader

baselines:
  easy:
    score: 0.95
  medium:
    score: 0.70
  hard:
    score: 0.45
